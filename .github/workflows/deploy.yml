name: Deploy API Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate OpenAPI spec
        run: yarn test

      - name: Bundle spec to JSON
        run: yarn build

      - name: Generate index.html
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <title>API Reference</title>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="icon" type="image/png" href="https://redocly.github.io/redoc/favicon.png">
              <style>
                body { margin: 0; padding: 0; }
              </style>
            </head>
            <body>
              <redoc spec-url="openapi.json"
                     theme='{"colors":{"primary":{"main":"#32329f"}}}'
                     expand-responses="200,201"
                     required-props-first="true"
                     hide-download-button="false">
              </redoc>
              <script src="https://cdn.jsdelivr.net/npm/redoc/bundles/redoc.standalone.js"></script>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sdk:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@libre-net-pe'

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Generate TypeScript types
        run: yarn sdk:generate

      - name: Bump SDK version
        run: yarn version patch --no-git-tag-version
        working-directory: sdk

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/package.json sdk/package-lock.json
          git commit -m "chore: bump SDK version [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Install SDK dependencies
        run: yarn --cwd sdk install --frozen-lockfile

      - name: Build SDK
        run: yarn --cwd sdk build

      - name: Publish to GitHub Packages
        run: yarn publish
        working-directory: sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}